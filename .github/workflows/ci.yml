name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip and install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install package with dev dependencies
        run: |
          pip install -e ".[dev]"
        env:
          PIP_VERBOSE: 1

      - name: Verify installation
        run: |
          python -c "import iron; print('Iron version:', iron.__version__)"
          python -c "from iron.agent.engine import AgentEngine; print('Engine OK')"
          python -c "from iron.cli.main import cli; print('CLI OK')"

      - name: Collect test list (debug)
        run: |
          python -m pytest tests/ --collect-only -q 2>&1 | tail -20
        continue-on-error: true

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Lint with ruff
        run: |
          ruff check iron/ tests/
        continue-on-error: true

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          pip install pytest-cov
          python -m pytest tests/ --cov=iron --cov-report=xml
        continue-on-error: true
